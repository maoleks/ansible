---
- name: Install nginx
  hosts: web
  become: yes

  tasks:

    - name: install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: start nginx
      service:
        name: nginx
        state: started

    - name: create index.html
      copy:
        dest: /var/www/html/index.html
        content: "Hello world from Ansible"

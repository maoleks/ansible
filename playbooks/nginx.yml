---
- name: Install Nginx and create Hello World page
  hosts: web
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Create index.html
      copy:
        dest: /var/www/html/index.html
        content: "Hello World from Ansible!"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Ensure Nginx is running
      systemd:
        name: nginx
        state: started
        enabled: yes

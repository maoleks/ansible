---
- name: Install Docker, Nginx container and deploy index.html
  hosts: docker
  become: yes

  tasks:
    - name: Update apt and install prerequisites
      apt:
        update_cache: yes
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repo
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker
      apt:
        name: docker-ce
        state: latest
        update_cache: yes

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install Python pip
      apt:
        name: python3-pip
        state: present
        update_cache: yes

    - name: Install Docker Python module for Ansible
      pip:
        name: docker
        executable: pip3

    - name: Copy custom index.html to remote server
      copy:
        src: ../files/index.html
        dest: /home/ubuntu/index.html
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Run Nginx container
      community.docker.docker_container:
        name: nginx-server
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "80:80"
        volumes:
          - /home/ubuntu/index.html:/usr/share/nginx/html/index.html:ro
